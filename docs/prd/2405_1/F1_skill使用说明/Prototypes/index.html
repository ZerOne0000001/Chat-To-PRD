<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演示大纲 | Chat-To-PRD (pm-workflow)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@200;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            padding-top: 180px; /* Space for the new top nav, matches nav height */
        }

        /* Subtle cinematic glowing orb in background */
        .glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            max-width: 1000px;
            max-height: 1000px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(120, 119, 198, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
            transition: background 0.8s ease;
        }

        .glass-card {
            background: rgba(25, 25, 25, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* --- Tree Navigation Styles --- */
        .tree-nav-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 180px; /* Fixed height to ensure it doesn't overlap content */
            z-index: 50;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        #global-nav-container {
            position: relative;
            min-width: max-content;
            padding: 0 40px;
            height: 100%; /* Fill the fixed container height */
            display: flex;
            align-items: center; /* Vertically center the tree */
            justify-content: center;
        }

        #tree-lines-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #tree-nodes {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 48px; /* Space between columns */
        }

        .tree-col {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .tree-row {
            display: flex;
            align-items: center;
            gap: 48px;
            position: relative;
        }

        .tree-node {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* Elastic scale */
            opacity: 0.6;
            padding: 8px 20px;
            border-radius: 24px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 rgba(255, 255, 255, 0);
        }

        .tree-node:hover {
            opacity: 0.9;
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        @keyframes nodePulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .tree-node.active {
            opacity: 1;
            background-color: #fff;
            border-color: #fff;
            color: #000;
            animation: nodePulse 2s infinite cubic-bezier(0.66, 0, 0, 1); /* Pulse effect */
            transform: scale(1.1); /* Elastic Q-bounce */
        }

        .tree-node.completed {
            opacity: 0.9;
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1);
        }

        /* SVG Line Animations */
        path.tree-link {
            transition: stroke 0.5s ease, filter 0.5s ease, stroke-dashoffset 0.8s ease-in-out;
        }

        .node-label {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .tree-node.active .node-label {
            color: #000;
        }

        .branch-label {
            position: absolute;
            left: -40px;
            font-size: 11px;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: opacity 0.3s;
            font-weight: bold;
        }
        
        .tree-row.active .branch-label {
            opacity: 0.8;
            color: #fff;
        }

        /* --- Rest of existing styles --- */

        .text-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-pill {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            white-space: nowrap;
        }
        
        .nav-pill:hover {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .nav-pill.active {
            background: rgba(255, 255, 255, 1);
            color: #000;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.25);
        }

        .file-item {
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .file-item:last-child { border-bottom: none; }
        .file-item:hover {
            transform: translateX(8px);
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }

        /* Smooth fade transition for content */
        .fade-enter {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Scenario Buttons */
        .scenario-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .scenario-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-4px);
        }
        .scenario-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="flex flex-col items-center px-4 sm:px-8 lg:px-24 pb-12 pt-[200px] relative">

        // --- State ---
        let currentMode = 'standard';
        let currentStepId = 'prep';

        const navNodesEl = document.getElementById('tree-nodes');
        const svgEl = document.getElementById('tree-lines-svg');
        const navContainerEl = document.getElementById('global-nav-container');
        const mainEl = document.getElementById('main-content');
        const glowBg = document.getElementById('glow-bg');

        // --- Rendering ---
        function renderNav() {
            const isFastTrackActive = currentMode === 'fastTrack';
            
            // 1. Update Rows
            document.getElementById('row-standard').className = `tree-row ${!isFastTrackActive ? 'active' : 'opacity-30'}`;
            document.getElementById('row-fastTrack').className = `tree-row ${isFastTrackActive ? 'active' : 'opacity-30'}`;

            // Helper to set node state
            const setNodeState = (id, isActive, isCompleted) => {
                const el = document.getElementById(id);
                if (el) {
                    el.className = `tree-node ${isActive ? 'active' : (isCompleted ? 'completed' : '')}`;
                }
            };

            // 2. Update Nodes
            setNodeState('node-prep', currentStepId === 'prep', currentStepId !== 'prep');
            setNodeState('node-init', currentStepId === 'init', currentStepId !== 'prep' && currentStepId !== 'init');

            // Standard Nodes
            setNodeState('node-s1', !isFastTrackActive && currentStepId === 1, !isFastTrackActive && currentStepId > 1);
            setNodeState('node-s2', !isFastTrackActive && currentStepId === 2, !isFastTrackActive && currentStepId > 2);

            setNodeState('node-s4', !isFastTrackActive && currentStepId === 4, !isFastTrackActive && currentStepId > 4);
            setNodeState('node-s5', !isFastTrackActive && currentStepId === 5, !isFastTrackActive && currentStepId > 5);
            setNodeState('node-s6', !isFastTrackActive && currentStepId === 6, false);

            // Fast Track Nodes
            setNodeState('node-f4', isFastTrackActive && currentStepId === 4, isFastTrackActive && currentStepId > 4);
            setNodeState('node-f5', isFastTrackActive && currentStepId === 5, false);

            // 3. Draw Lines (Update SVG)
            requestAnimationFrame(drawLines);
        }

        const connectionsData = [
            { id: 'link-prep-init', from: 'node-prep', to: 'node-init' },
            { id: 'link-init-s1', from: 'node-init', to: 'node-s1', curved: true, branch: 'standard' },
            { id: 'link-s1-s2', from: 'node-s1', to: 'node-s2', branch: 'standard' },
            { id: 'link-s2-s3', from: 'node-s2', to: 'node-s3', branch: 'standard' },
            { id: 'link-s3-s4', from: 'node-s3', to: 'node-s4', branch: 'standard' },
            { id: 'link-s4-s5', from: 'node-s4', to: 'node-s5', branch: 'standard' },
            { id: 'link-s5-s6', from: 'node-s5', to: 'node-s6', branch: 'standard' },
            { id: 'link-init-f4', from: 'node-init', to: 'node-f4', curved: true, branch: 'fastTrack' },

        function drawLines() {
            if (!svgEl || !navContainerEl) return;
            
            // 1. First ensure all paths exist and update their state
            const isFastTrackActive = currentMode === 'fastTrack';
            const activeLinks = [];
            if (currentStepId !== 'prep') activeLinks.push('link-prep-init');
            
            if (!isFastTrackActive && currentStepId !== 'prep' && currentStepId !== 'init') {
                activeLinks.push('link-init-s1');
                if (currentStepId >= 2) activeLinks.push('link-s1-s2');
                if (currentStepId >= 3) activeLinks.push('link-s2-s3');
                if (currentStepId >= 4) activeLinks.push('link-s3-s4');
                if (currentStepId >= 5) activeLinks.push('link-s4-s5');
                if (currentStepId >= 6) activeLinks.push('link-s5-s6');
            } else if (isFastTrackActive && currentStepId !== 'prep' && currentStepId !== 'init') {
                activeLinks.push('link-init-f4');
                if (currentStepId >= 5) activeLinks.push('link-f4-f5');
            }

            connectionsData.forEach((conn) => {
                let pathEl = document.getElementById(conn.id);
                if (!pathEl) {
                    pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    pathEl.setAttribute('id', conn.id);
                    pathEl.classList.add('tree-link');
                    pathEl.setAttribute('fill', 'none');
                    svgEl.appendChild(pathEl);
                }

                const isActive = activeLinks.includes(conn.id);
                const strokeColor = isActive ? 'rgba(255, 255, 255, 0.7)' : 'rgba(255, 255, 255, 0.15)';
                const strokeWidth = isActive ? 2.5 : 2;
                const filter = isActive ? 'drop-shadow(0 0 6px rgba(255,255,255,0.4))' : 'none';

                pathEl.setAttribute('stroke', strokeColor);
                pathEl.setAttribute('stroke-width', strokeWidth);
                pathEl.style.filter = filter;
                
                // Flow logic trigger
                if (isActive && !pathEl.dataset.active) {
                    pathEl.dataset.active = 'true';
                    pathEl.dataset.needsFlow = 'true';
                } else if (!isActive && pathEl.dataset.active) {
                    pathEl.style.strokeDashoffset = 0; 
                    delete pathEl.dataset.active;
                }
            });

            // 2. Update geometry and apply flow
            updateLinesGeometry();
            
            // 3. Trigger tracking animation to follow bouncy nodes
            startLineTracking();
        }

        function updateLinesGeometry() {
            if (!svgEl || !navContainerEl) return;
            const containerRect = navContainerEl.getBoundingClientRect();

            connectionsData.forEach((conn) => {
                const el1 = document.getElementById(conn.from);
                const el2 = document.getElementById(conn.to);
                const pathEl = document.getElementById(conn.id);
                if (!el1 || !el2 || !pathEl) return;

                const rect1 = el1.getBoundingClientRect();
                const rect2 = el2.getBoundingClientRect();

                const x1 = rect1.right - containerRect.left;
                const y1 = rect1.top + rect1.height / 2 - containerRect.top;
                
                const x2 = rect2.left - containerRect.left;
                let y2 = rect2.top + rect2.height / 2 - containerRect.top;

                if (!conn.curved) {
                    y2 = y1; // Force perfectly horizontal
                }

                let pathD = '';
                if (conn.curved) {
                    const controlPointX = x1 + (x2 - x1) * 0.5;
                    pathD = `M ${x1} ${y1} C ${controlPointX} ${y1}, ${controlPointX} ${y2}, ${x2} ${y2}`;
                } else {
                    pathD = `M ${x1} ${y1} L ${x2} ${y2}`;
                }

                pathEl.setAttribute('d', pathD);

                // Handle flow animation execution if flagged
                if (pathEl.dataset.needsFlow === 'true') {
                    const length = pathEl.getTotalLength() || 100;
                    pathEl.style.strokeDasharray = length;
                    pathEl.style.transition = 'none'; 
                    pathEl.style.strokeDashoffset = length; 
                    
                    void pathEl.offsetWidth; // Force reflow
                    
                    pathEl.style.transition = 'stroke 0.5s ease, filter 0.5s ease, stroke-dashoffset 0.6s ease-in-out';
                    pathEl.style.strokeDashoffset = 0; 
                    delete pathEl.dataset.needsFlow;
                } else if (pathEl.dataset.active === 'true') {
                    // Update length smoothly on resize/tracking
                    const length = pathEl.getTotalLength() || 100;
                    pathEl.style.strokeDasharray = length;
                }
            });
        }

        let lineAnimStart = 0;

        function startLineTracking() {
            lineAnimStart = performance.now();
            if (!lineAnimFrame) {
                const track = (time) => {
                    updateLinesGeometry();
                    if (time - lineAnimStart < 600) { // Track for 600ms
                        lineAnimFrame = requestAnimationFrame(track);
                    } else {
                        lineAnimFrame = null;
                    }
                };
                lineAnimFrame = requestAnimationFrame(track);
            }
        }

                        <div class="flex flex-col sm:flex-row gap-6 w-full max-w-3xl">
                            <!-- Standard Mode -->
                            <div onclick="setMode('standard')" class="scenario-btn flex-1 p-8 text-left ${currentMode === 'standard' ? 'active' : ''} group relative">
                                ${currentMode === 'standard' ? '<div class="absolute top-4 right-4 w-3 h-3 rounded-full bg-white shadow-[0_0_10px_#fff]"></div>' : ''}
                                <h3 class="text-2xl font-semibold text-white/90 mb-3 group-hover:text-white">标准工作流</h3>
                                <p class="text-sm text-white/50 leading-relaxed">
                                    完整生命周期：包含需求启动、架构设计、原型制作、综合 PRD 与最终交互原型的全链路生成。
                                </p>
                            </div>
                            
                            <!-- Fast Track Mode -->
                            <div onclick="setMode('fastTrack')" class="scenario-btn flex-1 p-8 text-left ${currentMode === 'fastTrack' ? 'active' : ''} group relative">
                                ${currentMode === 'fastTrack' ? '<div class="absolute top-4 right-4 w-3 h-3 rounded-full bg-white shadow-[0_0_10px_#fff]"></div>' : ''}
                                <h3 class="text-2xl font-semibold text-white/90 mb-3 group-hover:text-white">快速通道</h3>
                                <p class="text-sm text-white/50 leading-relaxed">
                                    敏捷模式：跳过繁琐的中间件分析与原型制作，直接根据简短对话输出最终版本的 PRD。
                                </p>
                            </div>
                        </div>

                        <div class="mt-16">
                            <button onclick="nextStep()" class="px-8 py-3 bg-white text-black rounded-full font-medium hover:scale-105 transition-transform shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                                开始演示
                            </button>
                        </div>
                    </div>
                `;
            } else {
                // Standard Stage View
                let artifactsHtml = stepData.artifacts.map(a => `
                    <div class="file-item p-4 flex items-center gap-4 sm:gap-6 cursor-default">
                        <div class="flex-shrink-0 w-10 h-10 sm:w-12 sm:h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-white/70 shadow-inner">
                            ${icons[a.icon] || icons['doc']}
                        </div>
                        <div>
                            <h4 class="text-lg sm:text-xl font-medium text-white/90 mb-1 break-all">${a.name}</h4>
                            <p class="text-xs sm:text-sm text-white/40 font-light">${a.desc}</p>
                        </div>
                    </div>
                `).join('');

                if (stepData.artifacts.length === 0) {
                    artifactsHtml = '<div class="p-8 text-center text-white/30 text-sm border border-dashed border-white/10 rounded-2xl">该阶段暂无实体文件输出</div>';
                }

                mainEl.innerHTML = `
                    <!-- Left: Stage Info -->
                    <div class="w-full md:w-5/12 p-8 lg:p-16 xl:p-20 flex flex-col justify-center border-b md:border-b-0 md:border-r border-white/5 relative overflow-hidden">
                        <div class="absolute -left-20 -top-20 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
                        
                        <div class="relative z-10 flex-1 flex flex-col justify-center">
                            <span class="text-xs sm:text-sm font-medium tracking-widest uppercase text-white/40 mb-4 block">第 ${stepData.id} 阶段</span>
                            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold tracking-tight text-gradient mb-6 sm:mb-8 leading-tight">
                                ${stepData.title.replace(' ', '<br>')}
                            </h1>
                            <p class="text-base sm:text-lg lg:text-xl text-white/60 font-light leading-relaxed">
                                ${stepData.desc}
                            </p>
                        </div>

                        <!-- Mobile-only controls inside left pane -->
                        <div class="flex md:hidden justify-between mt-8 pt-6 border-t border-white/10">
                            <button onclick="prevStep()" class="text-sm text-white/50 hover:text-white transition-colors">← 上一步</button>
                            <button onclick="nextStep()" class="text-sm text-white/50 hover:text-white transition-colors">下一步 →</button>
                        </div>
                    </div>

                    <!-- Right: Artifacts -->
                    <div class="w-full md:w-7/12 p-8 lg:p-16 xl:p-20 flex flex-col justify-center bg-white/[0.02] relative">
                        <h3 class="text-xs sm:text-sm font-medium tracking-widest uppercase text-white/40 mb-6 sm:mb-8">核心输出产物</h3>
                        
                        <div class="flex flex-col gap-2 flex-1 justify-center">
                            ${artifactsHtml}
                        </div>

                        <!-- Desktop controls -->
                        <div class="hidden md:flex justify-between absolute bottom-8 left-16 right-16">
                            <button onclick="prevStep()" class="px-4 py-2 rounded-full border border-white/10 text-sm text-white/60 hover:bg-white/10 hover:text-white transition-all">← 上一步</button>
                            <button onclick="nextStep()" class="px-4 py-2 rounded-full border border-white/10 text-sm text-white/60 hover:bg-white/10 hover:text-white transition-all">下一步 →</button>
                        </div>
                    </div>
                `;
            }
        }

        // --- Actions ---
        function setMode(mode) {
            if (currentMode !== mode) {
                currentMode = mode;
                // DO NOT reset step, allow direct jump
                renderNav();
                renderContent();
            }
        }

        let jumpTargetId = null;

        async function goToStep(id, mode = null) {
            if (mode && mode !== currentMode) {
                currentMode = mode;
            }
            
            const steps = currentMode === 'standard' 
                ? ['prep', 'init', 1, 2, 3, 4, 5, 6] 
                : ['prep', 'init', 4, 5];

            const currentIndex = steps.indexOf(currentStepId);
            const targetIndex = steps.indexOf(id);

            jumpTargetId = id;

            if (targetIndex > currentIndex && (targetIndex - currentIndex > 1)) {
                // Sequential jump forward
                for (let i = currentIndex + 1; i <= targetIndex; i++) {
                    if (jumpTargetId !== id) break; // User clicked another step, cancel sequence
                    
                    currentStepId = steps[i];
                    renderNav();
                    
                    if (i === targetIndex) {
                        renderContent();
                    } else {
                        // Wait for line flow animation before jumping to next
                        await new Promise(r => setTimeout(r, 400));
                    }
                }
            } else {
                // Normal click or jumping backwards
                currentStepId = id;
                renderNav();
                renderContent();
            }
        }

        function nextStep() {
            const steps = workflows[currentMode];
            const currentIndex = steps.findIndex(s => s.id === currentStepId);
            if (currentIndex < steps.length - 1) {
                goToStep(steps[currentIndex + 1].id);
            }
        }

        function prevStep() {
            const steps = workflows[currentMode];
            const currentIndex = steps.findIndex(s => s.id === currentStepId);
            if (currentIndex > 0) {
                goToStep(steps[currentIndex - 1].id);
            }
        }

        // --- Init ---
        renderNav();
        renderContent();
    </script>
</body>
</html>
